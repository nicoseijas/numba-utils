name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .[dev]
      - name: Tests
        run: pytest -q

  examples:
    name: examples run end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e .[dev]
      - name: Run examples
        run: |
          python examples/01_quickstart.py
          python examples/02_collections_inside_njit.py
          python examples/03_diagnostics_and_testing.py

  benchmarks-smoke:
    name: benchmarks compile and run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e .[dev]
      - name: Smoke-run benchmark suites
        # CI numbers are not publishable (shared runners), but the
        # suites must always compile and run — see docs/benchmarking.md.
        run: |
          python benchmarks/bench_arrays_algorithms.py > /dev/null
          python benchmarks/bench_random_collections.py > /dev/null
          python benchmarks/bench_parallel.py > /dev/null
